# =============================================================================
# LOCAL DEVELOPMENT ONLY — NOT FOR PRODUCTION
# =============================================================================
# This compose file runs on HTTP (no TLS) for local development.
# =============================================================================

services:
  # ---------------------------------------------------------------------------
  # Brrq Node - Bitcoin L2 with Hash-First Architecture
  # ---------------------------------------------------------------------------
  node:
    build:
      context: ..
      dockerfile: docker/Dockerfile.node
    container_name: brrq-node
    expose:
      - "8545"        # JSON-RPC API (internal, proxied by nginx)
      - "8546"        # WebSocket API (internal, proxied by nginx)
    ports:
      - "30303:30303" # P2P networking (needs external access)
    volumes:
      - brrq-data:/data
    restart: unless-stopped
    deploy:
      resources:
        limits:
          cpus: "4"
          memory: 8G
        reservations:
          cpus: "1"
          memory: 2G
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8545/api/v1/health"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 15s
    logging:
      driver: json-file
      options:
        max-size: "50m"
        max-file: "5"

  # ---------------------------------------------------------------------------
  # Brrq Explorer - Next.js Web Frontend
  # ---------------------------------------------------------------------------
  web:
    build:
      context: ../web
      dockerfile: ../docker/Dockerfile.web
      args:
        NEXT_PUBLIC_API_URL: http://node:8545
        NEXT_PUBLIC_WS_URL: ws://node:8546
    container_name: brrq-web
    expose:
      - "3000"        # Internal only (proxied by nginx)
    depends_on:
      node:
        condition: service_healthy
    restart: unless-stopped
    deploy:
      resources:
        limits:
          cpus: "1"
          memory: 512M
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  # ---------------------------------------------------------------------------
  # Nginx Reverse Proxy
  # ---------------------------------------------------------------------------
  nginx:
    # Pin version. For production, use digest from image-digests.lock
    image: nginx:1.27.4-alpine
    container_name: brrq-nginx
    ports:
      - "80:80"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - web
      - node
    restart: unless-stopped
    deploy:
      resources:
        limits:
          cpus: "1.0"
          memory: 256M
        reservations:
          cpus: "0.25"
          memory: 64M
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

volumes:
  brrq-data:
    driver: local

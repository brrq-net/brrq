\* Apalache / TLC configuration for Rotation spec.
\*
\* Usage with Apalache:
\*   apalache-mc check --config=Rotation.cfg MC_Rotation.tla
\*
\* Usage with TLC:
\*   java -jar tla2tools.jar -config Rotation.cfg MC_Rotation.tla

CONSTANTS
    Validators = MC_Validators
    Byzantine = MC_Byzantine
    MaxRounds = MC_MaxRounds

SPECIFICATION Spec

INVARIANTS
    NoTwoFinalizedAtSameHeight
    FinalizedIsStable
    FinalizationRequiresQuorum
    SlashingCompleteness
    QuorumIntersection

PROPERTIES
    LivenessUnderHeal
